services:
  db:
    image: postgres:15
    container_name: pete_db_container
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pete_db}
      POSTGRES_USER: ${POSTGRES_USER:-pete_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-your_docker_password}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    networks:
      - pete-net

volumes:
  postgres_data:

networks:
  pete-net:
    driver: bridge
