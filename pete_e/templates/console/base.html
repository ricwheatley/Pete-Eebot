<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title }} - Pete-Eebot</title>
    <link rel="stylesheet" href="/static/operator_console.css">
    <script src="/static/operator_console.js" defer></script>
  </head>
  <body class="app-shell">
    <header class="topbar">
      <a class="brand" href="/console" aria-label="Pete-Eebot console">
        <span class="brand-mark">P</span>
        <span class="brand-copy">
          <strong>Pete-Eebot</strong>
          <span>Operator Console</span>
        </span>
      </a>
      <div class="account">
        <span class="account-name">{{ user_display_name }}</span>
        <span class="account-role">{{ user.roles | join(", ") }}</span>
        <button class="icon-button" type="button" data-logout aria-label="Sign out" title="Sign out">
          <span aria-hidden="true">Logout</span>
        </button>
      </div>
    </header>

    <div class="workspace">
      <aside class="sidebar" aria-label="Console navigation">
        <nav class="nav-list">
          {% for item in nav_items %}
          <a class="nav-link{% if item.key == active_nav %} is-active{% endif %}" href="{{ item.href }}">
            {{ item.label }}
          </a>
          {% endfor %}
        </nav>
      </aside>

      <main class="content" id="main-content">
        {% block content %}{% endblock %}
      </main>
    </div>
  </body>
</html>
